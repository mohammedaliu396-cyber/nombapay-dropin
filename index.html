<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NombaPay Drop-in SDK Core Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #111827;
            --accent: #0f766e;
            --bg-light: #f9fafb;
            --border: #e5e7eb;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: #ffffff;
            color: var(--ink);
            line-height: 1.5;
            padding-top: 70px;
        }

        /* Responsive Navbar */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: #ffffff;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 1000;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .brand span {
            color: var(--accent);
        }

        /* Hero Section */
        .hero {
            padding: 40px 20px;
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            background: #f0fdfa;
            border: 1px solid #ccfbf1;
            color: var(--accent);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .hero h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 1.2;
            margin-bottom: 16px;
        }

        .hero h1 span {
            color: var(--accent);
        }

        /* Code Block Graphic Container */
        /* Code Block Graphic Container */
        .code-window {
            background: #0b0f19;
            border-radius: 12px;
            padding: 20px;
            text-align: left;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            margin: 30px auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            overflow-x: auto;
            color: #e2e8f0; 
        }

        .window-header {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
            border-bottom: 1px solid #1e293b;
            padding-bottom: 10px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        .dot.r { background: #ef4444; }
        .dot.y { background: #eab308; }
        .dot.g { background: #22c55e; }

        .code-text {
            color: #94a3b8;
        }
        .code-keyword { color: #f472b6; }
        .code-string { color: #38bdf8; }
        .code-num { color: #fb923c; }

        /* Action Button */
        .cta-btn {
            display: block;
            width: 100%;
            background: var(--accent);
            color: #ffffff;
            text-align: center;
            padding: 14px;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            margin-top: 20px;
            font-size: 1rem;
            transition: background 0.2s;
        }

        .cta-btn:hover {
            background: #0d5e58;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="brand">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="24" height="24" rx="6" fill="#0f766e"/><path d="M7 12L10 15L17 8" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            NombaPay <span>Drop-in</span>
        </div>
    </nav>

    <section class="hero">
        <div class="tag">NOMBA × DEVCAREER HACKATHON 2026</div>
        <h1>Payments on <span>any website</span>. One script tag.</h1>
        
        <div class="code-window">
            <div class="window-header">
                <div class="dot r"></div><div class="dot y"></div><div class="dot g"></div>
            </div>
<pre><code><span class="code-keyword">&lt;script</span> <span class="code-text">src=</span><span class="code-string">"nombapay-dropin.js"</span><span class="code-keyword">&gt;&lt;/script&gt;</span>

NombaPayDropin.<span class="code-text">setup</span>({
  <span class="code-text">amount:</span> <span class="code-num">5000</span>,
  <span class="code-text">customerEmail:</span> <span class="code-string">"customer@email.com"</span>
}).<span class="code-text">open</span>();</code></pre>
        </div>

        <a href="#" class="cta-btn">Launch Live Sandbox Demo</a>
    </section>

</body>
</html>
